services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voedashboard}
      POSTGRES_USER: ${POSTGRES_USER:-voe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voe_secret_2024}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voe} -d ${POSTGRES_DB:-voedashboard}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-voe}:${POSTGRES_PASSWORD:-voe_secret_2024}@db:5432/${POSTGRES_DB:-voedashboard}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-voe}:${POSTGRES_PASSWORD:-voe_secret_2024}@db:5432/${POSTGRES_DB:-voedashboard}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3001:3000"
    env_file: .env
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
